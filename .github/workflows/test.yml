name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y jq bats

      - name: Run tests
        run: |
          bats tests/test_tiers.bats \
               tests/test_init.bats \
               tests/test_tip.bats \
               tests/test_correct.bats \
               tests/test_session_start.bats
